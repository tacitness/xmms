# markdownlint configuration for XMMS project
# https://github.com/DavidAnson/markdownlint
---
default: true

MD013:
  line_length: 120
  code_blocks: false
  tables: false

MD033:
  allowed_elements: ["kbd", "br", "details", "summary"]

MD041: false   # first line need not be top-level heading in all docs
MD024: false   # duplicate headings allowed (changelog entries etc.)
